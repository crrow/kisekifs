all-features = true

[advisories]
# bincode 1.3 is a direct kiseki-meta dependency and defines existing RocksDB
# bytes. RUSTSEC-2025-0141 is a maintenance advisory, not a vulnerability; a
# replacement requires a versioned metadata format and migration before the
# durable encoding can change.
